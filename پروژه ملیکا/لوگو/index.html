<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <svg width="340" height="120" viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Premium Gold -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A48D67"/>
      <stop offset="100%" stop-color="#8B7654"/>
    </linearGradient>

    <!-- Deep Teal Accent -->
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4341"/>
      <stop offset="100%" stop-color="#215A57"/>
    </linearGradient>
  </defs>

  <!-- Icon: Premium Drop + Clinical Geometry -->
  <g transform="translate(20,15)">
    <!-- Outer geometric frame -->
    <circle cx="40" cy="40" r="35" stroke="url(#gold)" stroke-width="3" fill="none"/>

    <!-- Drop -->
    <path d="M40 12 C30 28 22 38 22 50 A18 18 0 1 0 58 50 C58 38 50 28 40 12 Z"
          fill="url(#teal)"/>

    <!-- Inner Shine -->
    <path d="M40 28 C33 28 28 34 32 37 C36 40 44 35 42 30 C41 29 40 28 40 28 Z"
          fill="#FFFFFF" opacity="0.85"/>
  </g>

  <!-- Brand Name -->
  <text x="110" y="70"
        font-family="Poppins, Arial, sans-serif"
        font-size="42"
        letter-spacing="4"
        font-weight="600"
        fill="url(#gold)">
      MANELY
  </text>

  <!-- Subtitle (optional, removable) -->
  <text x="113" y="94"
        font-family="Poppins, sans-serif"
        font-size="14"
        letter-spacing="2"
        fill="#5D6D7E">
      BEAUTY & CLINICAL CARE
  </text>

</svg>

    </div>
</body>
</html>
