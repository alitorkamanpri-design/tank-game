    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="MANELY - محصولات زیبایی و مراقبت بالینی"

      property="og:description"

    <meta property="og:image" content="/assets/og-image.jpg" />

      name="twitter:title"

    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://manely.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MANELY",
        "description": "محصولات زیبایی و مراقبت بالینی",
        "url": "https://manely.com",
        "logo": "https://manely.com/logo.svg",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Service"
        }
      }
    </script>
  </head>
  <body>
    <!-- Header -->
    <header class="header" role="banner">
      <div class="header__container">
        <!-- Logo -->
        <a href="/" class="header__logo" aria-label="صفحه اصلی MANELY">
          <svg
            width="340"
            height="120"
            viewBox="0 0 340 120"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <defs>
              <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#A48D67" />
                <stop offset="100%" stop-color="#8B7654" />
              </linearGradient>
              <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1A4341" />
                <stop offset="100%" stop-color="#215A57" />
              </linearGradient>
            </defs>
            <g transform="translate(20,15)">
              <circle
                cx="40"
                cy="40"
                r="35"
                stroke="url(#gold)"
                stroke-width="3"
                fill="none"
              />
              <path
                d="M40 12 C30 28 22 38 22 50 A18 18 0 1 0 58 50 C58 38 50 28 40 12 Z"
                fill="url(#teal)"
              />
              <path
                d="M40 28 C33 28 28 34 32 37 C36 40 44 35 42 30 C41 29 40 28 40 28 Z"
                fill="#FFFFFF"
                opacity="0.85"
              />
            </g>
            <text
              x="110"
              y="70"
              font-family="Poppins, Arial, sans-serif"
              font-size="42"
              letter-spacing="4"
              font-weight="600"
              fill="url(#gold)"
            >
              MANELY
            </text>
            <text
              x="113"
              y="94"
              font-family="Poppins, sans-serif"
              font-size="14"
              letter-spacing="2"
              fill="#5D6D7E"
            >
              BEAUTY & CLINICAL CARE
            </text>
          </svg>
        </a>

        <!-- Navigation -->
        <nav class="header__nav" role="navigation" aria-label="منوی اصلی">
          <ul class="nav__list">
            <li class="nav__item">
              <a href="/" class="nav__link active" aria-current="page">خانه</a>
            </li>
            <li class="nav__item">
              <a href="/about" class="nav__link">درباره ما</a>
            </li>
            <li class="nav__item">
              <a href="/products" class="nav__link">محصولات</a>
            </li>
            <li class="nav__item">
              <a href="/perfumes" class="nav__link">عطرهای لوکس</a>
            </li>
            <li class="nav__item">
              <a href="/blog" class="nav__link">مجله زیبایی</a>
            </li>
            <li class="nav__item">
              <a href="/contact" class="nav__link">تماس با ما</a>
            </li>
          </ul>
        </nav>

        <!-- Auth Buttons -->
        <div class="header__auth">
          <a
            href="/login"
            class="btn btn--outline"
            aria-label="ورود به حساب کاربری"
            >ورود</a
          >
          <a
            href="/register"
            class="btn btn--primary"
            aria-label="ثبت نام در سایت"
            >ثبت نام</a
          >
        </div>

        <!-- Mobile Menu Toggle -->
        <button
          class="header__toggle"
          aria-label="باز و بسته کردن منو"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <!-- Main Content (Placeholder) -->
    <main role="main">
      <!-- محتوای اصلی سایت در اینجا قرار می‌گیرد -->
    </main>

    <!-- JavaScript -->
    <script src="script.js"></script>
