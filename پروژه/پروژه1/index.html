<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ورود - FreelanceFlow</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <h1>🚀 FreelanceFlow</h1>
        <p class="subtitle">مدیریت حرفه‌ای پروژه‌های فریلنسری</p>

        <div id="loginForm" class="form-container">
          <h2>ورود به حساب</h2>
          <input type="email" id="loginEmail" placeholder="ایمیل" required />
          <input
            type="password"
            id="loginPassword"
            placeholder="رمز عبور"
            required
          />
          <button onclick="handleLogin()">ورود</button>
          <p class="switch-text">
            حساب کاربری ندارید؟
            <a href="#" onclick="showRegister()">ثبت‌نام کنید</a>
          </p>
        </div>

        <div id="registerForm" class="form-container" style="display: none">
          <h2>ثبت‌نام</h2>
          <input
            type="text"
            id="registerName"
            placeholder="نام و نام خانوادگی"
            required
          />
          <input type="email" id="registerEmail" placeholder="ایمیل" required />
          <input
            type="password"
            id="registerPassword"
            placeholder="رمز عبور"
            required
          />
          <button onclick="handleRegister()">ثبت‌نام</button>
          <p class="switch-text">
            حساب کاربری دارید؟ <a href="#" onclick="showLogin()">وارد شوید</a>
          </p>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="auth.js"></script>
  </body>
</html>
