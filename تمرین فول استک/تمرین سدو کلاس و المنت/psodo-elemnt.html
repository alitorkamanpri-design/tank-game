<!DOCTYPE html>
<html>
<head>
<style>
    .title::before{
        content:"🚀";
    }
    .title::after{
        content:"✅";
    }
    .text::first-letter{
        font-size: x-large;
        color: red;
    }
    .text::first-line{
        font-weight: bold;
        color: blue;

    }
    .text::selection{
        background-color: yellow;
    }
    .card{
        border: 3px solid blue;
        border-radius: 12px;
        display: inline-block;
        background-color: rgb(217, 235, 235);
position: relative;
width: 300px;
height: auto;
padding: 20px;
    }
    .card:hover{
     transform: translateY(-5px);
  box-shadow: 0 9px 12px rgba(0, 0, 0, 0.15);
    }
    
       .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 30px;
    background: red;
    border-radius: 8px 8px 0 0;


    }
</style>
</head>

<body>

<h2 class="title">آموزش CSS</h2>

<p class="text">
CSS یکی از مهمترین ابزارهای طراحی وب است که برای استایل دادن به صفحات استفاده می‌شود.
</p>
<div class="card">
  <h3>Macbook</h3>
  <p>Powerful laptop for developers</p>
</div>

</body>
</html>
