<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tank Game 2 - Cyber Military Edition</title>

    <!-- فونت سایبر -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ------------------------------------------
   تنظیمات کلی و پس‌زمینه سایبری
--------------------------------------------- */

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Orbitron", sans-serif;
        background: radial-gradient(circle at top, #0f1424, #050510 70%);
        user-select: none;
      }

      /* ------------------------------------------
   UI بالای صفحه (امتیاز – جان – موج)
--------------------------------------------- */
      #ui {
        position: fixed;
        top: 15px;
        right: 15px;
        width: 250px;
        color: #7fff7f;
        font-size: 14px;
        z-index: 10;
      }

      .panel {
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid #00ff88;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        box-shadow: 0 0 10px #00ff8855;
      }

      .progress {
        margin-top: 8px;
        width: 100%;
        height: 8px;
        border-radius: 5px;
        background: #222;
        overflow: hidden;
      }
      #hpFill {
        background: linear-gradient(90deg, #ff4444, #ffaa00, #44ff44);
        height: 100%;
        width: 100%;
        transition: width 0.3s;
      }

      /* ------------------------------------------
   منوی شروع بازی
--------------------------------------------- */
      #startMenu {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.88);
        color: #7fff7f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 25px;
        z-index: 20;
        text-align: center;
      }

      #startMenu h1 {
        font-size: 45px;
        text-shadow: 0 0 25px #00ff88;
      }

      .start-btn {
        padding: 15px 40px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #1e7a1e, #46ff99);
        color: #002200;
        font-size: 20px;
        cursor: pointer;
        transition: 0.25s;
      }
      .start-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #00ff88;
      }

      /* ------------------------------------------
   افکت لرزش انفجار
--------------------------------------------- */
      .shake {
        animation: screenShake 0.2s linear;
      }
      @keyframes screenShake {
        0% {
          transform: translate(5px, -5px);
        }
        25% {
          transform: translate(-5px, 5px);
        }
        50% {
          transform: translate(4px, 0px);
        }
        75% {
          transform: translate(-4px, -3px);
        }
        100% {
          transform: translate(0, 0);
        }
      }

      /* ------------------------------------------
   دکمه‌های کنترل موبایل
--------------------------------------------- */
      .mobile-controls {
        position: fixed;
        bottom: 20px;
        width: 100%;
        text-align: center;
        z-index: 15;
      }
      .mc-btn {
        padding: 20px 35px;
        margin: 8px;
        font-size: 20px;
        border-radius: 10px;
        background: rgba(0, 255, 130, 0.2);
        border: 1px solid #00ff88;
        color: #00ff99;
      }
      @media (min-width: 768px) {
        .mobile-controls {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <!-- ------------------------------------------
     UI
------------------------------------------- -->
    <div id="ui">
      <div class="panel">امتیاز: <span id="score">0</span></div>

      <div class="panel">
        جان
        <div class="progress">
          <div id="hpFill"></div>
        </div>
      </div>
    </div>

    <!-- ------------------------------------------
     منوی شروع
------------------------------------------- -->
    <div id="startMenu">
      <h1>⚡ TANK GAME 2 ⚡</h1>
      <button class="start-btn" id="startBtn">شروع بازی</button>
      <p style="font-size: 13px; color: #aaa">
        Space → شلیک
        <br />
        ← → چرخش لوله
      </p>
    </div>

    <!-- ------------------------------------------
     کنترل موبایل
------------------------------------------- -->
    <div class="mobile-controls">
      <button class="mc-btn" id="leftBtn">⬅️</button>
      <button class="mc-btn" id="fireBtn">🔥</button>
      <button class="mc-btn" id="rightBtn">➡️</button>
    </div>

    <!-- ------------------------------------------
     بوم اصلی
------------------------------------------- -->
    <canvas id="game"></canvas>

    <script>
      /* ======================================================
   تنظیم بوم
====================================================== */
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      /* ======================================================
   متغیرهای بازی
====================================================== */
      let angle = 0; // زاویه لوله
      let bullets = []; // گلوله‌ها
      let enemies = []; // دشمن‌ها
      let score = 0;
      let hp = 100;
      let gameRunning = false;

      /* ============================
   رویداد شروع بازی
============================ */
      document.getElementById("startBtn").onclick = () => {
        document.getElementById("startMenu").style.display = "none";
        gameRunning = true;
        spawnEnemies();
        gameLoop();
      };

      /* ======================================================
   رویدادهای کیبورد
====================================================== */
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") angle -= 0.1;
        if (e.key === "ArrowRight") angle += 0.1;
        if (e.key === " " || e.key === "Enter") fireBullet();
      });

      /* ======================================================
   کنترل موبایل
====================================================== */
      document.getElementById("leftBtn").ontouchstart = () => (angle -= 0.1);
      document.getElementById("rightBtn").ontouchstart = () => (angle += 0.1);
      document.getElementById("fireBtn").ontouchstart = () => fireBullet();

      /* ======================================================
   شلیک گلوله
====================================================== */
      function fireBullet() {
        const bx = canvas.width / 2 + Math.cos(angle) * 50;
        const by = canvas.height - 90 + Math.sin(angle) * 50;

        bullets.push({
          x: bx,
          y: by,
          vx: Math.cos(angle) * 10,
          vy: Math.sin(angle) * 10,
          size: 6,
        });
      }

      /* ======================================================
   اسپاون دشمن
====================================================== */
      function spawnEnemies() {
        setInterval(() => {
          if (!gameRunning) return;
          enemies.push({
            x: Math.random() * canvas.width,
            y: -40,
            size: 35,
            speed: 2 + Math.random() * 2,
          });
        }, 700);
      }

      /* ======================================================
   انفجار + لرزش
====================================================== */
      function explode(x, y) {
        ctx.fillStyle = "#ffdd55";
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.fill();
        document.body.classList.add("shake");
        setTimeout(() => document.body.classList.remove("shake"), 150);
      }

      /* ======================================================
   حلقه اصلی بازی
====================================================== */
      function gameLoop() {
        if (!gameRunning) return;

        // پس‌زمینه سایبری
        ctx.fillStyle = "#050510";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawTank();

        updateBullets();
        updateEnemies();

        requestAnimationFrame(gameLoop);
      }

      /* ======================================================
   رسم تانک
====================================================== */
      function drawTank() {
        const baseY = canvas.height - 60;

        ctx.fillStyle = "#1f7a1f";
        ctx.fillRect(canvas.width / 2 - 40, baseY, 80, 40);

        ctx.save();
        ctx.translate(canvas.width / 2, baseY);
        ctx.rotate(angle);
        ctx.fillStyle = "#3aff99";
        ctx.fillRect(0, -6, 60, 12);
        ctx.restore();
      }

      /* ======================================================
   گلوله‌ها
====================================================== */
      function updateBullets() {
        ctx.fillStyle = "#00ff88";

        bullets.forEach((b, i) => {
          b.x += b.vx;
          b.y += b.vy;

          ctx.beginPath();
          ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
          ctx.fill();

          if (b.y < 0) bullets.splice(i, 1);
        });
      }

      /* ======================================================
   دشمن‌ها
====================================================== */
      function updateEnemies() {
        ctx.fillStyle = "#ff4444";

        enemies.forEach((e, index) => {
          e.y += e.speed;

          // رسم
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.fill();

          // برخورد با زمین
          if (e.y > canvas.height - 60) {
            hp -= 10;
            updateHP();
            explode(e.x, e.y);
            enemies.splice(index, 1);
          }

          // برخورد با گلوله
          bullets.forEach((b, bi) => {
            const dx = b.x - e.x;
            const dy = b.y - e.y;

            if (Math.sqrt(dx * dx + dy * dy) < e.size) {
              score += 100;
              document.getElementById("score").textContent = score;
              explode(e.x, e.y);
              enemies.splice(index, 1);
              bullets.splice(bi, 1);
            }
          });
        });
      }

      /* ======================================================
   آپدیت نوار جان
====================================================== */
      function updateHP() {
        document.getElementById("hpFill").style.width = hp + "%";
        if (hp <= 0) location.reload();
      }
    </script>
  </body>
</html>
