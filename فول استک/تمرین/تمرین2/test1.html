<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم لاگین</title>
</head>
<body>
<main>
    <h1>ثبت نام</h1>
    <form action="" method="post">
        <fieldset>
            <label for="">ثبت نام</label>
<input type="text" name="username" value="" placeholder="نام کاربری" required >
<input type="password" name="password" value="" placeholder="رمز عبور" required>
<input type="email" name="email" value="" placeholder="ایمیل" required>
<input type="tel" name="telhon" value="" placeholder="شماره تماس" required pattern="[0-9]{11}">
<label for="janon">قوانین</label>
<input type="checkbox" name="janon" placeholder="قوانین" required>
<button type="submit" >ارسال</button>
</fieldset>
    </form>
</main>
    
</body>
</html>
